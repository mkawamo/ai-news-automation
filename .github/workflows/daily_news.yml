name: Daily AI News

on:
  schedule:
    # GitHub Actions cron is UTC. 22:00 UTC is 07:00 JST.
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          missing=0
          for name in GEMINI_API_KEY SMTP_HOST SMTP_USER SMTP_PASSWORD MAIL_FROM MAIL_TO; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub Secret::$name is not set. Add it in Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Send daily AI news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SUBJECT: ${{ vars.MAIL_SUBJECT || 'AIニュース日次まとめ' }}
        run: python main.py
