name: Daily AI News

on:
  schedule:
    # GitHub Actions cron is UTC. This runs every 5 minutes from 06:00 to 07:55 JST.
    # The daily success marker prevents duplicate emails after the first successful send.
    - cron: "*/5 21-22 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send even if today's success marker already exists"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-ai-news-send
  cancel-in-progress: false

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set run date
        id: run-date
        run: |
          news_date=$(TZ=Asia/Tokyo date +%F)
          jst_time=$(TZ=Asia/Tokyo date +%H:%M)
          echo "news_date=$news_date" >> "$GITHUB_OUTPUT"
          echo "jst_time=$jst_time" >> "$GITHUB_OUTPUT"
          echo "NEWS_DATE=$news_date" >> "$GITHUB_ENV"
          echo "JST_TIME=$jst_time" >> "$GITHUB_ENV"
          echo "Daily news date: $news_date $jst_time JST"

      - name: Restore daily success marker
        id: sent-marker
        uses: actions/cache/restore@v5
        with:
          path: .sent/${{ steps.run-date.outputs.news_date }}.txt
          key: ai-news-sent-${{ steps.run-date.outputs.news_date }}

      - name: Skip duplicate daily send
        if: steps.sent-marker.outputs.cache-hit == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force_send)
        run: echo "AI news email was already sent for $NEWS_DATE JST. Skipping this retry slot."

      - name: Set up Python
        if: steps.sent-marker.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_send)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.sent-marker.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_send)
        run: pip install -r requirements.txt

      - name: Validate required secrets
        if: steps.sent-marker.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_send)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          missing=0
          for name in GEMINI_API_KEY SMTP_HOST SMTP_USER SMTP_PASSWORD MAIL_FROM MAIL_TO; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub Secret::$name is not set. Add it in Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Send daily AI news
        id: send-news
        if: steps.sent-marker.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_send)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SUBJECT: ${{ vars.MAIL_SUBJECT || 'AIニュース日次まとめ' }}
        run: python main.py

      - name: Notify final scheduled failure
        if: failure() && github.event_name == 'schedule' && steps.run-date.outputs.jst_time == '07:55' && steps.sent-marker.outputs.cache-hit != 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FAILURE_MAIL_SUBJECT: AIニュース送信失敗
        run: python notify_failure.py

      - name: Create daily success marker
        if: success() && (steps.sent-marker.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_send))
        run: |
          mkdir -p .sent
          printf 'sent_at_utc=%s\nnews_date_jst=%s\njst_time=%s\nrun_id=%s\n' "$(date -u +%FT%TZ)" "$NEWS_DATE" "$JST_TIME" "$GITHUB_RUN_ID" > ".sent/$NEWS_DATE.txt"

      - name: Save daily success marker
        if: success() && steps.sent-marker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .sent/${{ steps.run-date.outputs.news_date }}.txt
          key: ai-news-sent-${{ steps.run-date.outputs.news_date }}
